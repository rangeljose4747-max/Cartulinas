<!DOCTYPE html>
<html lang="es" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JONATHAN RANGEL | CARTULIA PREMIUM INVERCIONES GUICAR 2025</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#141313",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#c4c7c7",
                    },
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    borderRadius: { xl: "0.75rem", "2xl": "1rem" },
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface antialiased">

    <div class="bg-glow-orb w-96 h-96 bg-orange-500/30 -top-40 -left-40"></div>
    <div class="bg-glow-orb w-[500px] h-[500px] bg-purple-500/20 bottom-0 right-0"></div>
    <div class="bg-glow-orb w-80 h-80 bg-blue-400/20 top-1/3 left-1/2"></div>

    <header class="fixed top-0 w-full z-50 bg-zinc-950/70 backdrop-blur-xl border-b border-white/10 shadow-2xl shadow-black/30">
        <div class="flex justify-between items-center w-full px-6 md:px-8 h-16 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/JJRB47/JJRB47/main/assets/logo-jrb.png" alt="Logo Jonathan Rangel" class="w-9 h-9 rounded-lg object-contain bg-white/5 p-1 border border-white/10" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-orange-500 to-pink-500 flex items-center justify-center text-xs font-bold" style="display:none;">JR</div>
                <div>
                    <div class="text-lg md:text-xl font-light tracking-widest text-white uppercase">JONATHAN RANGEL</div>
                </div>
            </div>
            <button onclick="openCart()" class="relative p-2 rounded-full glass hover:bg-white/10 transition-all active:scale-95" aria-label="Abrir carrito">
                <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
                <span id="cartBadge" class="hidden absolute -top-1 -right-1 w-5 h-5 text-white text-[10px] font-bold rounded-full flex items-center justify-center shadow-lg" style="background-color: #10b981;">0</span>
            </button>
        </div>
    </header>

    <nav class="fixed top-16 left-0 right-0 z-40 bg-zinc-950/60 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-5 md:px-8">
            <div id="tabBar" class="flex gap-2 overflow-x-auto py-2.5 scrollbar-hide"></div>
        </div>
    </nav>

    <main class="relative z-10 pt-32 pb-28 lg:pb-32">
        <div class="max-w-7xl mx-auto px-5 md:px-8">
            <div id="allSections"></div>
        </div>
    </main>

    <div id="cartOverlay" class="fixed inset-0 z-[60] bg-black/70 overlay opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeCart()"></div>

    <div id="cartPanel" class="fixed top-0 right-0 bottom-0 z-[70] w-full max-w-md cart-panel closed bg-[#0f0f0f]/95 backdrop-blur-2xl border-l border-white/10 shadow-2xl flex flex-col">
        <div class="flex items-center justify-between px-6 py-5 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center"><i data-lucide="shopping-bag" class="w-5 h-5 text-orange-400"></i></div>
                <h2 class="text-xl font-semibold text-white">Tu pedido</h2>
                <span id="cartCount" class="text-xs text-zinc-400 bg-white/10 px-2 py-0.5 rounded-full">(0)</span>
            </div>
            <button onclick="closeCart()" class="p-2 rounded-full hover:bg-white/10 transition" aria-label="Cerrar carrito"><i data-lucide="x" class="w-5 h-5 text-zinc-400"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-4 space-y-3"></div>
        <div id="cartEmpty" class="flex-1 flex flex-col items-center justify-center text-center px-6">
            <i data-lucide="package-open" class="w-14 h-14 text-zinc-700 mb-3"></i>
            <p class="text-zinc-400 text-sm">Tu selección está vacía</p>
            <p class="text-zinc-500 text-xs mt-1">Explora las categorías y elige tus productos.</p>
        </div>
        <div id="cartFooter" class="hidden border-t border-white/10 px-6 py-5 space-y-4">
            <div id="cartSummaryLines" class="text-xs text-amber-400 flex items-center gap-2"></div>
            <div class="flex justify-between items-baseline"><span class="text-sm text-zinc-400 font-medium">Total unidades/paquetes</span><span id="cartTotal" class="font-bold text-2xl text-white">0</span></div>
            <button onclick="sendWhatsApp()" class="w-full bg-gradient-to-r from-[#25D366] to-[#128C7E] py-3.5 rounded-xl text-white font-bold flex items-center justify-center gap-2 shadow-xl hover:scale-[1.02] transition-transform active:scale-95"><i data-lucide="send" class="w-4 h-4"></i>Enviar pedido por WhatsApp</button>
            <button onclick="clearCart()" class="w-full py-2.5 rounded-xl border border-white/10 text-zinc-300 text-sm hover:bg-white/5 transition">Vaciar carrito</button>
        </div>
    </div>

    <button id="floatingCartBtn" onclick="openCart()" class="fixed bottom-24 left-5 z-50 md:hidden w-12 h-12 rounded-full glass border border-white/20 shadow-xl flex items-center justify-center backdrop-blur-md bg-zinc-900/80" aria-label="Abrir carrito flotante">
        <i data-lucide="shopping-cart" class="w-5 h-5 text-white"></i>
        <span id="floatingBadge" class="hidden absolute -top-1 -right-1 w-5 h-5 text-white text-[10px] font-bold rounded-full flex items-center justify-center" style="background-color: #10b981;">0</span>
    </button>

    <div id="toastContainer" class="fixed bottom-6 right-5 z-[80] space-y-2 pointer-events-none"></div>

    <script src="js/script.js"></script>
</body>
</html>
